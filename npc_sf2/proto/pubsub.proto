syntax = "proto3";

package pubsub;

// Mock Salesforce-style Pub/Sub for CDC events
service PubSub {
  rpc Publish (PublishRequest) returns (PublishResponse);
  rpc Subscribe (SubscribeRequest) returns (stream Event);
}

message PublishRequest {
  string topic_name = 1;
  string payload = 2;
}

message PublishResponse {
  string status = 1;
}

message SubscribeRequest {
  string topic_name = 1;
  string replay_preset = 2;
}

message Event {
  string replay_id = 1;
  string topic_name = 2;
  string payload = 3;
}
