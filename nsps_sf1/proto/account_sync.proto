syntax = "proto3";

package accountsync;

service AccountSyncService {
  rpc SyncAccount (AccountRequest) returns (SyncResponse);
}

message AccountRequest {
  string account_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string source_system = 6;
}

message SyncResponse {
  string status = 1;
}